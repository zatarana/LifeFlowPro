name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        # Esta ferramenta força a versão 8.2, independente do sistema
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2

      - name: Build Debug APK
        # Usamos 'gradle' diretamente, já que a action acima configurou a versão 8.2
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lifeflow-pro-debug
          path: app/build/outputs/apk/debug/app-debug.apk
